name: Build and Release Extension

# Workflow này sẽ tự động chạy mỗi khi bạn tạo một Tag mới bắt đầu bằng chữ "v" (ví dụ: v1.5.0, v1.6.0)
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Create Release
    runs-on: ubuntu-latest
    
    # Cấp quyền cho Action này được phép tạo Release trong kho lưu trữ của bạn
    permissions:
      contents: write

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Nén thư mục extension thành file Zip
        run: |
          # Di chuyển vào thư mục chứa code của bạn
          cd focus-pro
          # Nén toàn bộ file bên trong thành file zip ở thư mục gốc
          zip -r ../focus-pro-${{ github.ref_name }}.zip ./*
          cd ..

      - name: Tạo GitHub Release và Tải lên file Zip
        uses: softprops/action-gh-release@v2
        with:
          # Chỉ định file zip vừa tạo để đính kèm vào Release
          files: focus-pro-${{ github.ref_name }}.zip
          # Tự động tạo danh sách các thay đổi dựa trên commit của bạn
          generate_release_notes: true