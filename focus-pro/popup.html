<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Focus Pro</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <img src="icons/icon48.png" class="logo" alt="Focus Pro">
    <div>
      <h1>Focus Pro <span class="version-badge">v1.5.0</span></h1>
      <p>Focus player for Facebook, Meet &amp; TikTok.</p>
    </div>
  </header>

  <main>
    <div id="fb-controls" style="display: none;">
      <button class="primary" data-action="focus-contain">Focus</button>
      <button class="danger" data-action="close">Disable</button>
    </div>

    <div id="meet-controls" style="display: none;">
      <button class="primary" data-action="meet-focus">Focus Meet</button>
      <button class="danger" data-action="meet-close">Disable</button>
      <p class="hint">Main share stream will be enlarged. Audio preserved.</p>
    </div>

    <div id="tiktok-controls" style="display: none;">
      <button class="primary" data-action="tiktok-clean">Clean Gifts</button>
      <button class="danger" data-action="tiktok-restore">Restore</button>
      <p class="hint">Hide gift overlays and flying effects. Chat preserved.</p>
    </div>

    <section class="shortcuts">
      <span><b>Alt+Z</b> — Focus &nbsp;·&nbsp; <b>Alt+V</b> — Cover &nbsp;·&nbsp; <b>Alt+X</b> — Disable</span>
    </section>

    <p id="status">Checking page…</p>
  </main>

  <script src="popup.js"></script>
</body>
</html>
