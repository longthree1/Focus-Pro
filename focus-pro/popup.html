<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FB Reel Focus Pro</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <div class="logo">□</div>
    <div>
      <h1>FB Reel Focus Pro</h1>
      <p>Professional focus tools for video platforms.</p>
    </div>
  </header>

  <main>
    <div id="fb-controls" style="display: none;">
      <button class="primary" data-action="focus-contain">Focus</button>
      <button class="danger" data-action="close">Disable</button>
    </div>

    <div id="meet-controls" style="display: none;">
      <button class="primary" data-action="meet-focus">Focus Meet</button>
      <button class="danger" data-action="meet-close">Disable</button>
      <p style="font-size: 12px; margin-top: 8px; color: #666;">Main share stream will be enlarged. Audio preserved.</p>
    </div>

    <div id="tiktok-controls" style="display: none;">
      <button class="primary" data-action="tiktok-clean">Clean Gifts</button>
      <button class="danger" data-action="tiktok-restore">Restore</button>
      <p style="font-size: 12px; margin-top: 8px; color: #666;">Hide gift overlays and flying effects. Chat preserved.</p>
    </div>

    <section class="shortcuts">
      <span><b>Shortcuts:</b> focus - disable</span>
    </section>

    <p id="status">Checking page…</p>
  </main>

  <script src="popup.js"></script>
</body>
</html>
